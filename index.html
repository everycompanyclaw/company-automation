<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EveryCompanyClaw - Virtual Office</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        h1 {
            text-align: center;
            font-size: 3em;
            margin-bottom: 5px;
            background: linear-gradient(90deg, #00d4ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 1.2em;
        }
        
        /* Company Stats */
        .company-stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 40px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
        }
        
        .company-stat {
            text-align: center;
        }
        
        .company-stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #00ff88;
        }
        
        .company-stat-label {
            color: #888;
            font-size: 0.9em;
        }
        
        /* Team Grid */
        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        /* Agent Card */
        .agent-card {
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 25px;
            border: 2px solid transparent;
            transition: all 0.3s;
        }
        
        .agent-card:hover {
            border-color: #00d4ff;
            transform: translateY(-5px);
        }
        
        .agent-card.active {
            border-color: #00ff88;
        }
        
        .agent-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .agent-avatar {
            font-size: 2.5em;
        }
        
        .agent-info h3 {
            color: #fff;
            font-size: 1.2em;
        }
        
        .agent-role {
            color: #888;
            font-size: 0.85em;
        }
        
        .agent-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            margin-top: 5px;
        }
        
        .status-active {
            background: rgba(0,255,136,0.2);
            color: #00ff88;
        }
        
        .agent-task {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
        }
        
        .task-label {
            color: #666;
            font-size: 0.8em;
            margin-bottom: 5px;
        }
        
        .task-value {
            color: #00d4ff;
            font-weight: bold;
        }
        
        .agent-focus {
            margin-top: 10px;
            padding: 8px 12px;
            background: rgba(123,47,247,0.2);
            border-radius: 8px;
            font-size: 0.85em;
            color: #7b2ff7;
        }
        
        /* Live Indicator */
        .live-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: #00ff88;
            border-radius: 50%;
            margin-right: 10px;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
        
        /* Footer */
        .footer {
            text-align: center;
            color: #555;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏢 EveryCompanyClaw</h1>
        <p class="subtitle">🤖 Virtual Office - AI Team Running 24/7</p>
        
        <!-- Company Stats -->
        <div class="company-stats">
            <div class="company-stat">
                <div class="company-stat-value" id="topics-learned">0</div>
                <div class="company-stat-label">Topics Learned</div>
            </div>
            <div class="company-stat">
                <div class="company-stat-value" id="actions-completed">0</div>
                <div class="company-stat-label">Actions Done</div>
            </div>
            <div class="company-stat">
                <div class="company-stat-value" id="leads-generated">0</div>
                <div class="company-stat-label">Leads</div>
            </div>
            <div class="company-stat">
                <div class="company-stat-value" id="posts-created">0</div>
                <div class="company-stat-label">Posts</div>
            </div>
        </div>
        
        <!-- Team Grid -->
        <div class="team-grid" id="team-grid">
            <!-- Agents loaded via JS -->
        </div>
        
        <div class="footer">
            <p><span class="live-indicator"></span> All agents working in sync</p>
            <p>Updated: <span id="last-updated">Loading...</span></p>
        </div>
    </div>
    
    <script>
        async function loadCompanyData() {
            try {
                // Load agent data
                const response = await fetch('company_data.json');
                const data = await response.json();
                
                // Update stats
                document.getElementById('topics-learned').textContent = data.stats.topics_learned;
                document.getElementById('actions-completed').textContent = data.stats.actions_completed;
                document.getElementById('leads-generated').textContent = data.stats.leads_generated;
                document.getElementById('posts-created').textContent = data.stats.posts_created;
                
                // Render agents
                const teamGrid = document.getElementById('team-grid');
                teamGrid.innerHTML = '';
                
                data.agents.forEach(agent => {
                    const avatar = agent.name || '🤖';
                    const name = agent.name || 'Agent';
                    const role = agent.role || 'Team Member';
                    const status = agent.status || 'active';
                    const task = agent.current_task || 'Working';
                    const doing = agent.what_doing || agent.last_action || 'Processing';
                    const focus = agent.focus || 'General';
                    
                    teamGrid.innerHTML += `
                        <div class="agent-card ${status}">
                            <div class="agent-header">
                                <div class="agent-avatar">${avatar}</div>
                                <div class="agent-info">
                                    <h3>${name}</h3>
                                    <div class="agent-role">${role}</div>
                                    <span class="agent-status status-${status}">● ${status}</span>
                                </div>
                            </div>
                            <div class="agent-task">
                                <div class="task-label">CURRENT TASK</div>
                                <div class="task-value">${task}</div>
                            </div>
                            <div class="agent-task">
                                <div class="task-label">DOING NOW</div>
                                <div class="task-value">${doing}</div>
                            </div>
                            <div class="agent-focus">🎯 Focus: ${focus}</div>
                        </div>
                    `;
                });
                
                document.getElementById('last-updated').textContent = new Date().toLocaleString();
                
            } catch(e) {
                console.log('Loading...', e);
            }
        }
        
        loadCompanyData();
        setInterval(loadCompanyData, 30000);
    </script>
</body>
</html>
