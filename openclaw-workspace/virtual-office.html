<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EveryCompanyClaw HQ - Pokemon Style</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --grass: #88c070; --grass2: #70a858; --path: #d8b090; --path2: #c8a080;
  --floor: #e8d8b0; --floor2: #d8c8a0; --wall: #483850; --wall2: #382840;
  --door: #c87820; --doorGlow: #ffd700;
  --ui-bg: #1a1a3a; --ui-border: #202060; --ui-text: #f0e860;
  --ui-text2: #c8c8e8;
  --ceo: #007700; --dev: #7800a0; --social: #e87890; --ops: #006888;
}
body {
  background: #0a0a1a;
  font-family: 'Press Start 2P', monospace;
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh; overflow: hidden;
  image-rendering: pixelated;
}
#app {
  display: flex; flex-direction: column; align-items: center;
  width: 100%; max-width: 700px; padding: 4px;
}
#top-bar {
  width: 100%; background: var(--ui-bg); border: 3px solid var(--ui-border);
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 10px; margin-bottom: 4px; font-size: 7px; color: var(--ui-text);
}
#top-bar .title { font-size: 8px; letter-spacing: 1px; }
#top-bar .clock { color: var(--ui-text2); }
#top-bar .team { color: var(--ui-text2); }
.blink { animation: blink 1s step-end infinite; }
@keyframes blink { 50% { opacity: 0; } }
#game-wrap {
  display: flex; gap: 4px; width: 100%;
}
#canvas-wrap {
  flex: 1; position: relative; overflow: hidden;
  border: 3px solid var(--ui-border); background: #111;
}
#canvas-wrap::before {
  content: ''; display: block; padding-top: 75%;
}
canvas {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  image-rendering: pixelated;
}
#side-panel {
  width: 120px; background: var(--ui-bg); border: 3px solid var(--ui-border);
  padding: 6px; font-size: 6px; color: var(--ui-text2); display: flex;
  flex-direction: column; gap: 8px;
}
.panel-section { display: flex; flex-direction: column; gap: 3px; }
.panel-label { font-size: 5px; color: var(--ui-text); margin-bottom: 2px; }
.stat-row { display: flex; justify-content: space-between; }
.stat-val { color: var(--ui-text); }
.agent-row { display: flex; align-items: center; gap: 4px; margin: 2px 0; }
.agent-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.agent-name { font-size: 5px; color: var(--ui-text2); }
#bottom-bar {
  width: 100%; background: var(--ui-bg); border: 3px solid var(--ui-border);
  padding: 5px 8px; margin-top: 4px; font-size: 6px;
}
#room-name { color: var(--ui-text); margin-bottom: 3px; font-size: 7px; }
#activity-log { color: var(--ui-text2); font-size: 5px; line-height: 1.6; min-height: 22px; }
#msg-line { color: var(--ui-text); font-size: 6px; min-height: 10px; }
#dpad-hint { display: flex; justify-content: center; gap: 4px; margin-top: 4px; color: var(--ui-text2); font-size: 6px; }

/* === HIRING BANNER === */
#hiring-banner {
  position: absolute; top: 0; left: 0; right: 0;
  background: #ffcc00; color: #000;
  text-align: center; font-size: 7px; padding: 5px 8px;
  display: none; z-index: 10;
  border-bottom: 3px solid #cc9900;
}
#hiring-banner.active { display: block; }
#hiring-banner.pulse {
  animation: bannerPulse 0.6s ease-in-out infinite alternate;
}
@keyframes bannerPulse {
  from { background: #ffcc00; color: #000; }
  to { background: #ff6600; color: #fff; }
}

/* === APPROVAL PANEL === */
#approval-overlay {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7); display: none; z-index: 20;
  justify-content: center; align-items: center;
}
#approval-overlay.active { display: flex; }

#approval-panel {
  background: #1a1a3a;
  border: 4px solid #ffd700;
  box-shadow:
    0 0 0 4px #1a1a3a,
    0 0 0 8px #ffd700,
    0 0 0 12px #1a1a3a,
    0 0 0 16px #aa8800,
    8px 8px 0 0 #aa8800,
    -8px -8px 0 0 #aa8800,
    8px -8px 0 0 #aa8800,
    -8px 8px 0 0 #aa8800;
  padding: 16px 20px;
  min-width: 260px;
  text-align: center;
  image-rendering: pixelated;
}
#approval-panel .ap-title {
  font-size: 9px; color: #ffd700; margin-bottom: 10px;
  text-shadow: 2px 2px 0 #aa8800;
}
#approval-panel .ap-subtitle {
  font-size: 6px; color: #c8c8e8; margin-bottom: 12px;
}
#approval-panel .ap-row {
  display: flex; align-items: center; justify-content: center;
  gap: 8px; margin: 6px 0; font-size: 7px; color: #f0e860;
}
#approval-panel .ap-color-swatch {
  width: 16px; height: 16px; border: 2px solid #ffd700;
  display: inline-block; vertical-align: middle;
}
#approval-panel .ap-buttons {
  display: flex; gap: 10px; justify-content: center;
  margin: 14px 0 8px;
}
#approval-panel .ap-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 7px; padding: 7px 12px;
  border: 3px solid;
  cursor: pointer; image-rendering: pixelated;
}
#btn-approve {
  background: #00aa44; color: #fff;
  border-color: #007722;
  box-shadow: 3px 3px 0 #004411;
}
#btn-approve:hover { background: #00cc55; }
#btn-decline {
  background: #cc2200; color: #fff;
  border-color: #881100;
  box-shadow: 3px 3px 0 #440000;
}
#btn-decline:hover { background: #ee3300; }
#approval-panel .ap-footer {
  font-size: 5px; color: #888; margin-top: 6px;
}
</style>
</head>
<body>
<div id="app">
  <div id="top-bar">
    <span class="title">EVERYCOMPANYCLAW HQ</span>
    <span class="clock" id="clock">00:00</span>
    <span class="team">TEAM: <span id="agent-count">2/8</span></span>
    <span class="blink" style="color:#ff4444;font-size:7px;">24/7</span>
  </div>
  <div id="game-wrap">
    <div id="canvas-wrap">
      <canvas id="game"></canvas>
      <div id="hiring-banner">🏢 HIRING OPPORTUNITY DETECTED — Approval Required!</div>
      <div id="approval-overlay">
        <div id="approval-panel">
          <div class="ap-title">🏢 HIRING OPPORTUNITY!</div>
          <div class="ap-subtitle">A new agent wants to join the team!</div>
          <div class="ap-row">Role: <strong id="ap-role">—</strong></div>
          <div class="ap-row">Color: <span id="ap-color-swatch" class="ap-color-swatch"></span> <span id="ap-color-name">—</span></div>
          <div class="ap-buttons">
            <button class="ap-btn" id="btn-approve">✅ APPROVE</button>
            <button class="ap-btn" id="btn-decline">❌ DECLINE</button>
          </div>
          <div class="ap-footer">(CEO approval required)</div>
        </div>
      </div>
    </div>
    <div id="side-panel">
      <div class="panel-section">
        <div class="panel-label">METRICS</div>
        <div class="stat-row"><span>Leads</span><span class="stat-val" id="s-leads">0</span></div>
        <div class="stat-row"><span>Pipeline</span><span class="stat-val" id="s-pipeline">$0</span></div>
        <div class="stat-row"><span>Actions</span><span class="stat-val" id="s-actions">0</span></div>
        <div class="stat-row"><span>Posts</span><span class="stat-val" id="s-posts">0</span></div>
      </div>
      <div class="panel-section">
        <div class="panel-label">TEAM ROSTER</div>
        <div id="roster-list"></div>
      </div>
    </div>
  </div>
  <div id="bottom-bar">
    <div id="room-name">OUTDOOR - CAMPUS</div>
    <div id="msg-line"></div>
    <div id="activity-log">Welcome to EveryCompanyClaw HQ!</div>
    <div id="dpad-hint"><span>▲</span><span>▼</span><span>◀</span><span>▶</span></div>
  </div>
</div>
<script>
// === CONSTANTS ===
const TILE = 32;
const MAP_W = 20, MAP_H = 15;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('22d');
canvas.width = MAP_W * TILE;
canvas.height = MAP_H * TILE;

// === COLORS ===
const C = {
  grass:'#88c070', grass2:'#70a858', grass3:'#609048',
  path:'#d8b090', path2:'#c8a080',
  floor:'#e8d8b0', floor2:'#d8c8a0', floor3:'#c8b890',
  wall:'#483850', wall2:'#382840', wallDark:'#281830',
  door:'#c87820', doorFrame:'#a06018',
  tree:'#305820', tree2:'#204810',
  ceo:'#007700', ceoLight:'#00aa00',
  dev:'#7800a0', devLight:'#b040d0',
  social:'#e87890', socialLight:'#ff9ab0',
  ops:'#006888', opsLight:'#0090b8',
  uiBorder:'#202060',
};

// === MAP DATA ===
// 0=grass, 1=path, 2=floor, 3=wall, 4=door, 5=tree
const MAP = [];
for(let y=0;y<MAP_H;y++){
  MAP[y]=[];
  for(let x=0;x<MAP_W;x++){
    // Default grass
    let t = 0;
    // Row 0-2 and row 14+: trees
    if(y<=2||y>=14){ t=5; }
    // Path column 9 (vertical) from row 3 to 14
    if(x===9&&y>=3&&y<=14){ t=1; }
    // Path row 9 (horizontal) from col 0 to 18
    if(y===9&&x>=0&&x<=18){ t=1; }
    // Operations building: col 0-8, row 3-8 (walls around)
    if(x>=0&&x<=8&&y>=3&&y<=8){
      if(x===0||x===8||y===3||y===8) t=(y===8&&x>=2&&x<=4)?4:3;
      else t=2;
    }
    // CEO office: col 10-18, row 3-8
    if(x>=10&&x<=18&&y>=3&&y<=8){
      if(x===10||x===18||y===3||y===8) t=(y===8&&x>=11&&x<=14)?4:3;
      else t=2;
    }
    // Social studio: col 0-8, row 10-14
    if(x>=0&&x<=8&&y>=10&&y<=14){
      if(x===0||x===8||y===10||y===14) t=(y===10&&x>=2&&x<=4)?4:3;
      else t=2;
    }
    // Lead lab: col 10-18, row 10-14
    if(x>=10&&x<=18&&y>=10&&y<=14){
      if(x===10||x===18||y===10||y===14) t=(y===10&&x>=13&&x<=16)?4:3;
      else t=2;
    }
    MAP[y][x]=t;
  }
}

// === ROOM DEFINITIONS ===
const ROOMS = {
  outdoor:{ name:'OUTDOOR - CAMPUS', enterMsg:'Welcome to EveryCompanyClaw HQ!' },
  ops:{ name:'OPERATIONS ROOM', enterMsg:'Systems are running smoothly.' },
  ceo:{ name:'CEO OFFICE', enterMsg:'Strategic planning in progress.' },
  social:{ name:'SOCIAL STUDIO', enterMsg:'Creating content...' },
  leadlab:{ name:'LEAD LAB', enterMsg:'Analyzing leads and pipeline.' },
};
const ROOM_TILES = {
  ops:{x1:0,y1:3,x2:8,y2:8,door:{x:3,y:8}},
  ceo:{x1:10,y1:3,x2:18,y2:8,door:{x:12,y:8}},
  social:{x1:0,y1:10,x2:8,y2:14,door:{x:3,y:10}},
  leadlab:{x1:10,y1:10,x2:18,y2:14,door:{x:14,y:10}},
};

// === TILE DRAWING ===
function drawGrass(x,y){
  ctx.fillStyle=C.grass; ctx.fillRect(x,y,TILE,TILE);
  // detail dots
  ctx.fillStyle=C.grass2;
  if(((x/TILE+y/TILE)*7)%5===0) ctx.fillRect(x+8,y+8,4,4);
  if(((x/TILE+y/TILE)*11)%7===1) ctx.fillRect(x+20,y+16,3,3);
  if(((x/TILE+y/TILE)*3)%4===2) ctx.fillRect(x+4,y+22,2,2);
}
function drawPath(x,y){
  ctx.fillStyle=C.path; ctx.fillRect(x,y,TILE,TILE);
  ctx.fillStyle=C.path2;
  ctx.fillRect(x+2,y+2,4,4);
  ctx.fillRect(x+20,y+14,4,4);
  ctx.fillRect(x+12,y+26,3,3);
}
function drawFloor(x,y){
  ctx.fillStyle=C.floor; ctx.fillRect(x,y,TILE,TILE);
  ctx.fillStyle=C.floor2;
  ctx.fillRect(x,y,TILE/2,TILE/2);
  ctx.fillRect(x+TILE/2,y+TILE/2,TILE/2,TILE/2);
  ctx.fillStyle=C.floor3;
  ctx.fillRect(x+TILE/2,y,2,TILE);
  ctx.fillRect(x,y+TILE/2,TILE,2);
}
function drawWall(x,y){
  ctx.fillStyle=C.wall; ctx.fillRect(x,y,TILE,TILE);
  ctx.fillStyle=C.wall2; ctx.fillRect(x,y,TILE,8);
  ctx.fillStyle=C.wallDark; ctx.fillRect(x,y+8,4,TILE-8);
  // brick lines
  ctx.fillStyle=C.wall2;
  ctx.fillRect(x+14,y,2,TILE);
  ctx.fillRect(x,y+16,TILE,2);
}
function drawDoor(x,y,glow){
  ctx.fillStyle=C.door; ctx.fillRect(x,y,TILE,TILE);
  ctx.fillStyle='#e8a840';
  ctx.fillRect(x+6,y+4,20,4);
  ctx.fillRect(x+6,y+14,20,2);
  ctx.fillRect(x+14,y+18,4,10);
  if(glow){
    ctx.shadowColor='#ffd700'; ctx.shadowBlur=8;
    ctx.fillStyle='#ffd700'; ctx.fillRect(x+4,y+2,2,TILE-4);
    ctx.fillRect(x+TILE-6,y+2,2,TILE-4);
    ctx.shadowBlur=0;
  }
}
function drawTree(x,y){
  ctx.fillStyle=C.grass; ctx.fillRect(x,y,TILE,TILE);
  ctx.fillStyle=C.tree;
  ctx.fillRect(x+4,y+6,24,22);
  ctx.fillStyle=C.tree2;
  ctx.fillRect(x+8,y+10,16,14);
  ctx.fillStyle='#88c070';
  ctx.fillRect(x+14,y+2,4,6);
}

// === DRAW MAP ===
function drawMap(currentRoom){
  for(let y=0;y<MAP_H;y++){
    for(let x=0;x<MAP_W;x++){
      const t=MAP[y][x];
      const px=x*TILE, py=y*TILE;
      if(t===0) drawGrass(px,py);
      else if(t===1) drawPath(px,py);
      else if(t===2){
        if(currentRoom==='outdoor') drawFloor(px,py);
        else drawFloor(px,py);
      }
      else if(t===3) drawWall(px,py);
      else if(t===4){
        const glow=checkDoorGlow(x,y);
        drawDoor(px,py,glow);
      }
      else if(t===5) drawTree(px,py);
    }
  }
}

// === DOOR GLOW ===
function checkDoorGlow(x,y){
  if(agentCount>=4 && x===3 && y===10) return true; // social door
  if(agentCount>=6 && x===14 && y===10) return true; // leadlab door
  return false;
}

// === AGENT SPRITES ===
// Pixel art via box-shadow technique on a tiny canvas
const SPRITE_SIZE=16;
const agentSprites={};

function makeSpriteCanvas(color, lightColor, facing='down', frame=0){
  const oc=document.createElement('canvas');
  oc.width=SPRITE_SIZE; oc.height=SPRITE_SIZE;
  const c=oc.getContext('2d');
  c.imageSmoothingEnabled=false;
  // Body
  c.fillStyle=color;
  c.fillRect(4,6,8,8);
  // Head
  c.fillStyle=lightColor;
  c.fillRect(5,2,6,5);
  // Eyes
  c.fillStyle='#fff';
  if(facing==='down'){
    c.fillRect(6,3,2,2); c.fillRect(9,3,2,2);
    c.fillStyle='#000'; c.fillRect(7,4,1,1); c.fillRect(10,4,1,1);
  } else if(facing==='up'){
    c.fillStyle='#000'; c.fillRect(6,2,2,2); c.fillRect(9,2,2,2);
  } else if(facing==='left'){
    c.fillRect(5,3,2,2); c.fillStyle='#000'; c.fillRect(6,4,1,1);
  } else {
    c.fillRect(10,3,2,2); c.fillStyle='#000'; c.fillRect(10,4,1,1);
  }
  // Feet
  c.fillStyle=color;
  if(frame===0){
    c.fillRect(5,14,3,2); c.fillRect(9,14,3,2);
  } else {
    c.fillRect(4,14,3,2); c.fillRect(10,14,3,2);
  }
  // Arms
  c.fillStyle=lightColor;
  if(frame===0){
    c.fillRect(2,8,2,4); c.fillRect(13,8,2,4);
  } else {
    c.fillRect(2,7,2,4); c.fillRect(13,9,2,4);
  }
  return oc;
}

const FACINGS=['down','up','left','right'];

function getAgentSprite(agent,facing,frame){
  const key=`${agent}_${facing}_${frame}`;
  if(!agentSprites[key]){
    const colors={
      CEO:{c:C.ceo, l:C.ceoLight},
      DevAgent:{c:C.dev, l:C.devLight},
      SocialAgent:{c:C.social, l:C.socialLight},
      OpsAgent:{c:C.ops, l:C.opsLight},
    };
    const {c,l}=colors[agent]||{c:'#888',l:'#aaa'};
    agentSprites[key]=makeSpriteCanvas(c,l,facing,frame);
  }
  return agentSprites[key];
}

// === AGENTS ===
let agents=[];
let agentCount=2;
let lastNewHire=Date.now();
let newHireMessage='';
let newHireTimer=0;
const AGENT_NAMES=['CEO','DevAgent','SocialAgent','OpsAgent','MarketerAgent','AnalystAgent','SalesAgent','SupportAgent','ResearcherAgent','DesignerAgent','WriterAgent','FinanceAgent'];
const AGENT_COLORS={CEO:C.ceo,DevAgent:C.dev,SocialAgent:C.social,OpsAgent:C.ops,MarketAgent:'#d0a000',DataAgent:'#0088aa',SalesAgent:'#aa4400',SupportAgent:'#448800',MarketerAgent:'#e06010',AnalystAgent:'#1070d0',ResearcherAgent:'#208040',DesignerAgent:'#c02080',WriterAgent:'#806020',FinanceAgent:'#206080'};
const AGENT_DISPLAY={CEO:'CEO',DevAgent:'DEV',SocialAgent:'SOCIAL',OpsAgent:'OPS',MarketAgent:'MKT',DataAgent:'DATA',SalesAgent:'SALES',SupportAgent:'SUPP',MarketerAgent:'MKT2',AnalystAgent:'ANLY',ResearcherAgent:'RES',DesignerAgent:'DES',WriterAgent:'WRT',FinanceAgent:'FIN'};

// === PENDING HIRE OPPORTUNITY ===
let pendingHireOpportunity=null; // null or {type, color, colorName}
let pendingHireTimeout=null;
const HIRE_POOL=['MarketerAgent','SalesAgent','AnalystAgent','SupportAgent','ResearcherAgent','DesignerAgent','WriterAgent','FinanceAgent'];
const HIRED=new Set(['CEO','DevAgent']);

function getRandomHireRole(){
  const available=HIRE_POOL.filter(t=>!HIRED.has(t));
  if(available.length===0) return null;
  return available[Math.floor(Math.random()*available.length)];
}

function showHiringBanner(){
  const banner=document.getElementById('hiring-banner');
  banner.classList.add('active');
  // Trigger pulse after a short delay
  setTimeout(()=>banner.classList.add('pulse'),100);
}
function hideHiringBanner(){
  const banner=document.getElementById('hiring-banner');
  banner.classList.remove('active','pulse');
}

function showApprovalPanel(role, color, colorName){
  document.getElementById('ap-role').textContent=role;
  const swatch=document.getElementById('ap-color-swatch');
  swatch.style.background=color;
  document.getElementById('ap-color-name').textContent=colorName;
  document.getElementById('approval-overlay').classList.add('active');
}
function hideApprovalPanel(){
  document.getElementById('approval-overlay').classList.remove('active');
}

function approveHire(){
  if(!pendingHireOpportunity) return;
  const {type}=pendingHireOpportunity;
  HIRED.add(type);
  const homePos=getHomeForAgent({type,room:'ops'});
  const side=Math.floor(Math.random()*4);
  let entryX, entryY;
  if(side===0){ entryX=9; entryY=3; }
  else if(side===1){ entryX=9; entryY=14; }
  else if(side===2){ entryX=0; entryY=9; }
  else { entryX=18; entryY=9; }
  const entry={
    type, name:type, id:type,
    x:entryX, y:entryY,
    facing:'down', frame:0,
    homeX:homePos.x, homeY:homePos.y,
    room:'outdoor',
    moving:false, moveTimer:0, idleTimer:0
  };
  agents.push(entry);
  agentCount++;
  newHireMessage='NEW HIRE! '+AGENT_DISPLAY[type]+' has joined!';
  newHireTimer=3000;
  updateRoster();
  if(agentCount>=4) flashMessage('Social Studio unlocked!');
  if(agentCount>=6) flashMessage('Lead Lab unlocked!');
  clearPendingHire();
  document.getElementById('msg-line').textContent=newHireMessage;
  lastNewHire=Date.now();
}

function declineHire(){
  if(pendingHireOpportunity){
    flashMessage('Hiring declined for '+AGENT_DISPLAY[pendingHireOpportunity.type]+'.');
  }
  clearPendingHire();
}

function clearPendingHire(){
  pendingHireOpportunity=null;
  if(pendingHireTimeout){ clearTimeout(pendingHireTimeout); pendingHireTimeout=null; }
  hideHiringBanner();
  hideApprovalPanel();
}

function checkPendingHire(){
  const now=Date.now();
  if(pendingHireOpportunity) return; // already pending
  if(agentCount>=8) return;
  if(now-lastNewHire>30000&&Math.random()<0.25){
    const type=getRandomHireRole();
    if(!type) return;
    pendingHireOpportunity={
      type,
      color:AGENT_COLORS[type]||'#888888',
      colorName:AGENT_DISPLAY[type]||type
    };
    showHiringBanner();
    showApprovalPanel(AGENT_DISPLAY[type]||type, pendingHireOpportunity.color, pendingHireOpportunity.color);
    // Auto-decline after 60 seconds
    pendingHireTimeout=setTimeout(()=>{
      if(pendingHireOpportunity){
        flashMessage('Hiring opportunity expired for '+AGENT_DISPLAY[pendingHireOpportunity.type]+'.');
        lastNewHire=Date.now();
        clearPendingHire();
      }
    },60000);
  }
}

// Wire up buttons
document.getElementById('btn-approve').addEventListener('click',approveHire);
document.getElementById('btn-decline').addEventListener('click',declineHire);

function initAgents(){
  agents=[
    {id:'CEO',name:'CEO',type:'CEO',x:14,y:7,facing:'up',frame:0,homeX:14,homeY:7,room:'ceo',moving:false,moveTimer:0,idleTimer:0},
    {id:'DevAgent',name:'DevAgent',type:'DevAgent',x:4,y:5,facing:'down',frame:0,homeX:4,homeY:5,room:'ops',moving:false,moveTimer:0,idleTimer:0},
  ];
  agentCount=2;
  updateRoster();
}

function updateRoster(){
  const list=document.getElementById('roster-list');
  list.innerHTML='';
  agents.forEach(a=>{
    const row=document.createElement('div');
    row.className='agent-row';
    const dot=document.createElement('span');
    dot.className='agent-dot';
    dot.style.background=AGENT_COLORS[a.type]||'#888';
    const nm=document.createElement('span');
    nm.className='agent-name';
    nm.textContent=AGENT_DISPLAY[a.type]||a.type;
    row.appendChild(dot); row.appendChild(nm);
    list.appendChild(row);
  });
  document.getElementById('agent-count').textContent=agentCount+'/8';
}

// === MOVEMENT ===
const ROOM_HOMES={
  ops:{CEO:{x:4,y:5},DevAgent:{x:4,y:5},OpsAgent:{x:4,y:5},MarketAgent:{x:2,y:5},DataAgent:{x:6,y:5}},
  ceo:{CEO:{x:14,y:5},DevAgent:{x:12,y:5},MarketAgent:{x:14,y:5}},
  social:{SocialAgent:{x:4,y:12},SupportAgent:{x:4,y:12}},
  leadlab:{OpsAgent:{x:14,y:12},DataAgent:{x:14,y:12},SalesAgent:{x:14,y:12}},
};

const ROOM_BOUNDS={
  ops:{x1:1,y1:4,x2:7,y2:7},
  ceo:{x1:11,y1:4,x2:17,y2:7},
  social:{x1:1,y1:11,x2:7,y2:13},
  leadlab:{x1:11,y1:11,x2:17,y2:13},
};

const DIR_DXDY={up:{dx:0,dy:-1},down:{dx:0,dy:1},left:{dx:-1,dy:0},right:{dx:1,dy:0}};

function getHomeForAgent(agent){
  const roomHomes=ROOM_HOMES[agent.room]||{};
  return roomHomes[agent.type]||{x:agent.x,y:agent.y};
}

function canMoveTo(agent,x,y,currentRoom){
  if(currentRoom==='outdoor'){
    if(x<0||x>=MAP_W||y<0||y>=MAP_H) return false;
    const t=MAP[y][x];
    if(t===3||t===5) return false;
    return true;
  } else {
    const b=ROOM_BOUNDS[currentRoom]||{x1:0,y1:0,x2:20,y2:20};
    if(x<b.x1||x>b.x2||y<b.y1||y>b.y2) return false;
    // Check walls within room (floor tiles only)
    if(MAP[y]&&MAP[y][x]!==2) return false;
    return true;
  }
}

function tryMove(agent,dir,currentRoom){
  const {dx,dy}=DIR_DXDY[dir];
  const nx=agent.x+dx, ny=agent.y+dy;
  if(canMoveTo(agent,nx,ny,currentRoom)){
    agent.x=nx; agent.y=ny;
    agent.facing=dir;
    return true;
  }
  return false;
}

function updateAgentAI(agent,currentRoom,dt){
  agent.idleTimer+=dt;
  if(agent.moving){
    agent.moveTimer-=dt;
    if(agent.moveTimer<=0){ agent.moving=false; agent.frame=0; }
  }
  if(agent.idleTimer>1500+Math.random()*2000){
    agent.idleTimer=0;
    const moves=['up','down','left','right'];
    const m=moves[Math.floor(Math.random()*moves.length)];
    if(tryMove(agent,m,currentRoom)){
      agent.moving=true; agent.moveTimer=200; agent.frame=(agent.frame+1)%2;
    }
  }
}

// === INDOOR ROOM DETAILS ===
function drawIndoorDetails(room){
  ctx.save();
  if(room==='ops'){
    // Server racks
    for(let i=0;i<3;i++){
      drawDesk(2+i*3,4,room);
      drawServerRack(2+i*3,5,room);
    }
  } else if(room==='ceo'){
    drawCEODesk(14,4,room);
    for(let i=0;i<2;i++) drawDesk(11+i*4,6,room);
  } else if(room==='social'){
    for(let i=0;i<3;i++) drawPostStation(2+i*3,11,room);
  } else if(room==='leadlab'){
    for(let i=0;i<3;i++) drawLeadScreen(11+i*3,11,room);
  }
  ctx.restore();
}

function drawDesk(x,y,room){
  const px=x*TILE, py=y*TILE;
  ctx.fillStyle='#a08060'; ctx.fillRect(px+4,py+8,24,18);
  ctx.fillStyle='#c0a080'; ctx.fillRect(px+6,py+4,20,8);
  ctx.fillStyle='#80c080'; ctx.fillRect(px+8,py+6,14,4);
}

function drawServerRack(x,y,room){
  const px=x*TILE, py=y*TILE;
  ctx.fillStyle='#404060'; ctx.fillRect(px+8,py+2,16,26);
  for(let i=0;i<4;i++){
    ctx.fillStyle='#00ff44'; ctx.fillRect(px+10,py+4+i*6,4,4);
    ctx.fillStyle='#ff4400'; ctx.fillRect(px+18,py+4+i*6,4,4);
  }
}

function drawCEODesk(x,y,room){
  const px=x*TILE, py=y*TILE;
  ctx.fillStyle='#c0a040'; ctx.fillRect(px+2,py+6,28,20);
  ctx.fillStyle='#e0c060'; ctx.fillRect(px+4,py+2,24,6);
  ctx.fillStyle='#ffd700'; ctx.fillRect(px+8,py+3,10,4);
  ctx.font='5px Press Start 2P';
  ctx.fillStyle='#ffd700'; ctx.fillText('CEO',px+8,py+8);
}

function drawPostStation(x,y,room){
  const px=x*TILE, py=y*TILE;
  ctx.fillStyle='#8060a0'; ctx.fillRect(px+4,py+8,24,18);
  ctx.fillStyle='#a080c0'; ctx.fillRect(px+6,py+4,20,8);
  ctx.fillStyle='#ff80c0'; ctx.fillRect(px+8,py+6,14,4);
}

function drawLeadScreen(x,y,room){
  const px=x*TILE, py=y*TILE;
  ctx.fillStyle='#006080'; ctx.fillRect(px+4,py+6,24,20);
  ctx.fillStyle='#0080a0'; ctx.fillRect(px+6,py+8,20,16);
  // Chart bars
  ctx.fillStyle='#00ff88';
  ctx.fillRect(px+8,py+18,3,4);
  ctx.fillRect(px+13,py+14,3,8);
  ctx.fillRect(px+18,py+10,3,12);
}



let msgQueue=[];
let currentMsg='';
let msgTimer=0;

function flashMessage(m){
  msgQueue.push(m);
  if(!currentMsg){
    currentMsg=msgQueue.shift();
    msgTimer=3000;
  }
  document.getElementById('msg-line').textContent=currentMsg;
}

// === CURRENT ROOM LOGIC ===
let currentRoom='outdoor';

function getAgentRoom(agent){
  if(agent.room!=='outdoor') return agent.room;
  // Check if on door
  for(const[r,def] of Object.entries(ROOM_TILES)){
    if(agent.x===def.door.x&&agent.y===def.door.y){
      return r;
    }
  }
  return 'outdoor';
}

// === METRICS (simulated) ===
let metrics={leads:0,pipeline:0,actions:0,posts:0};
setInterval(()=>{
  metrics.leads+=Math.floor(Math.random()*3);
  metrics.pipeline+=Math.floor(Math.random()*500);
  metrics.actions+=Math.floor(Math.random()*2);
  metrics.posts+=Math.random()<0.3?1:0;
  document.getElementById('s-leads').textContent=metrics.leads;
  document.getElementById('s-pipeline').textContent='$'+metrics.pipeline;
  document.getElementById('s-actions').textContent=metrics.actions;
  document.getElementById('s-posts').textContent=metrics.posts;
},3000);

// === CLOCK ===
function updateClock(){
  const n=new Date();
  document.getElementById('clock').textContent=n.toTimeString().slice(0,5);
}

// === GAME LOOP ===
let lastTime=0;
let animFrame=0;

function gameLoop(ts){
  const dt=ts-lastTime; lastTime=ts;
  animFrame++;

  updateClock();
  checkPendingHire();

  // Update messages
  if(newHireTimer>0){
    newHireTimer-=dt;
    if(newHireTimer<=0&&currentMsg===newHireMessage){
      currentMsg='';
      if(msgQueue.length>0){ currentMsg=msgQueue.shift(); newHireTimer=3000; }
      document.getElementById('msg-line').textContent=currentMsg;
    }
  }

  // Update agents
  agents.forEach(a=>updateAgentAI(a,currentRoom,dt));

  // Update side panel metrics
  document.getElementById('room-name').textContent=ROOMS[currentRoom]?.name||'OUTDOOR';

  // Draw
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawMap(currentRoom);
  if(currentRoom!=='outdoor') drawIndoorDetails(currentRoom);

  // Draw agents
  agents.forEach(a=>{
    const room=getAgentRoom(a);
    if(room!==currentRoom) return;
    const bobOffset=(a.moving?0:Math.sin(animFrame*0.1+a.x)*1);
    const spr=getAgentSprite(a.type,a.facing,a.frame);
    ctx.drawImage(spr,a.x*TILE+(TILE-SPRITE_SIZE)/2,a.y*TILE+(TILE-SPRITE_SIZE)+bobOffset);
  });

  // Activity log cycling
  if(animFrame%120===0){
    const logs=[
      'CEO reviewing quarterly targets...',
      'DevAgent shipping new features!',
      'Social posts getting engagement!',
      'OpsAgent monitoring systems...',
      'Pipeline growing steadily.',
      'New leads coming in...',
      'Team collaboration active!',
      'Automations running smoothly.',
    ];
    document.getElementById('activity-log').textContent=logs[Math.floor(Math.random()*logs.length)];
  }

  requestAnimationFrame(gameLoop);
}

// === INIT ===
initAgents();
requestAnimationFrame(gameLoop);
</script>
