<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EveryCompanyClaw - IG Post</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .post { 
            background: #0f0f0f; 
            border-radius: 20px; 
            padding: 30px; 
            max-width: 400px;
            width: 100%;
        }
        .logo { font-size: 2em; margin-bottom: 15px; }
        h1 { color: #fff; font-size: 1.8em; margin-bottom: 5px; }
        .handle { color: #888; margin-bottom: 20px; }
        .content { color: #fff; font-size: 1.1em; line-height: 1.6; margin-bottom: 20px; }
        .product { 
            background: #1a1a1a; 
            padding: 15px; 
            border-radius: 10px; 
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .product-name { color: #fff; }
        .product-price { color: #00ff88; font-weight: bold; }
        .link { color: #00ff88; text-decoration: none; font-size: 0.9em; }
        .hashtags { color: #667eea; font-size: 0.8em; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="post">
        <div class="logo">🤖</div>
        <h1>EveryCompanyClaw</h1>
        <p class="handle">@everycompanyclaw</p>
        
        <p class="content">
            🧵 20個Python自動化腳本幫你慳10+粒鐘！
            
            Email提取器、檔案整理、發票生成...
            全部ready to use!
            
            🇭🇰 香港製造
        </p>
        
        <div class="product">
            <span class="product-name">🐍 Python腳本套裝</span>
            <span class="product-price">$79</span>
        </div>
        <div class="product">
            <span class="product-name">⚡ Zapier範本</span>
            <span class="product-price">$49</span>
        </div>
        <div class="product">
            <span class="product-name">🧠 AI提示詞</span>
            <span class="product-price">$29</span>
        </div>
        
        <a href="https://everycompanyclaw.github.io/company-automation/" class="link">🔗 everycompanyclaw.github.io</a>
        
        <p class="hashtags">
            #python #automation #hkig #香港 #startup #indiehacker #buildinpublic
        </p>
    </div>
</body>
</html>
