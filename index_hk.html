<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EveryCompanyClaw - 自動化服務</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; line-height: 1.6; color: #333; background: #0f0f0f; }
        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        h1 { color: #fff; font-size: 2.5em; text-align: center; margin-bottom: 10px; }
        .subtitle { color: #888; text-align: center; margin-bottom: 30px; }
        .products { background: #1a1a1a; border-radius: 15px; padding: 30px; border: 1px solid #333; margin: 20px 0; }
        .products h2 { color: #fff; margin-bottom: 20px; }
        .product { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: #252525; border-radius: 10px; margin: 15px 0; }
        .product-name { color: #fff; font-weight: bold; }
        .product-price { color: #00ff88; font-size: 1.3em; font-weight: bold; }
        .buy-btn { background: #635bff; color: #fff; padding: 12px 25px; border-radius: 8px; text-decoration: none; font-weight: bold; }
        .contact { text-align: center; margin: 30px 0; color: #aaa; }
        .contact .email { color: #00ff88; font-size: 1.2em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 EveryCompanyClaw</h1>
        <p class="subtitle">商業自動化服務 | 幫你慳時間</p>
        
        <div class="products">
            <h2>📦 數碼產品（即時下載）</h2>
            
            <div class="product">
                <div class="product-name">🐍 Python 腳本套裝</div>
                <div style="text-align:right;">
                    <div class="product-price">$79</div>
                    <a href="https://buy.stripe.com/28E7sN3X7d28cSgh0M4AU03" class="buy-btn" target="_blank">購買</a>
                </div>
            </div>
            
            <div class="product">
                <div class="product-name">⚡ Zapier 範本</div>
                <div style="text-align:right;">
                    <div class="product-price">$49</div>
                    <a href="https://buy.stripe.com/cNieVf51b3ry19ycKw4AU04" class="buy-btn" target="_blank">購買</a>
                </div>
            </div>
            
            <div class="product">
                <div class="product-name">🧠 AI 提示詞庫</div>
                <div style="text-align:right;">
                    <div class="product-price">$29</div>
                    <a href="https://buy.stripe.com/bJe00l2T36DK9G411O4AU05" class="buy-btn" target="_blank">購買</a>
                </div>
            </div>
        </div>
        
        <div class="contact">
            <p>📧 everycompanyclaw@gmail.com</p>
            <p>🇭🇰 香港 | 🌍 全球</p>
        </div>
    </div>
</body>
</html>
